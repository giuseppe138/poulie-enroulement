<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Angle d'enroulement</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
–bg: #0b0f1a;
–bg2: #111827;
–card: #161d2e;
–card2: #1c2540;
–border: rgba(255,255,255,0.08);
–border2: rgba(255,255,255,0.14);
–blue: #3b82f6;
–blue-light: #60a5fa;
–green: #22c55e;
–green-light: #4ade80;
–yellow: #eab308;
–yellow-light: #facc15;
–red: #ef4444;
–red-light: #f87171;
–text: #f1f5f9;
–text2: #94a3b8;
–text3: #475569;
–radius: 18px;
–radius-sm: 12px;
–shadow: 0 4px 24px rgba(0,0,0,0.4);
–font: ‘DM Sans’, -apple-system, sans-serif;
–mono: ‘DM Mono’, ‘SF Mono’, monospace;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: var(–font);
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding: 0;
}

/* Gradient de fond fixe */
body::before {
content: ‘’;
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 60% 50% at 15% 0%, rgba(59,130,246,0.18) 0%, transparent 60%),
radial-gradient(ellipse 50% 40% at 85% 10%, rgba(99,102,241,0.12) 0%, transparent 55%),
radial-gradient(ellipse 40% 40% at 70% 90%, rgba(34,197,94,0.08) 0%, transparent 50%);
pointer-events: none;
}

/* Layout principal */
.app {
position: relative; z-index: 1;
max-width: 1100px;
margin: 0 auto;
padding: 32px 20px 60px;
}

/* Header */
.header {
margin-bottom: 36px;
}
.header-eyebrow {
display: inline-flex; align-items: center; gap: 8px;
font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
text-transform: uppercase; color: var(–blue-light);
background: rgba(59,130,246,0.12);
border: 1px solid rgba(59,130,246,0.25);
border-radius: 100px; padding: 5px 12px;
margin-bottom: 14px;
}
.header-eyebrow::before {
content: ‘’;
width: 6px; height: 6px; border-radius: 50%;
background: var(–blue); box-shadow: 0 0 6px var(–blue);
}
.header h1 {
font-size: clamp(28px, 5vw, 48px);
font-weight: 700; letter-spacing: -0.02em;
line-height: 1.1; color: var(–text);
margin-bottom: 6px;
}
.header-sub {
font-size: 15px; color: var(–text2); font-weight: 400;
}

/* Grid layout desktop */
.main-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
margin-bottom: 16px;
}
@media (max-width: 700px) {
.main-grid { grid-template-columns: 1fr; }
}

/* Card */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–radius);
box-shadow: var(–shadow);
overflow: hidden;
}
.card-inner { padding: 22px; }

.card-label {
font-size: 10px; font-weight: 700;
letter-spacing: 0.14em; text-transform: uppercase;
color: var(–text3); margin-bottom: 18px;
}

/* Inputs grid */
.inputs-grid {
display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

.field {
background: var(–bg);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
padding: 14px 14px 10px;
transition: border-color 0.2s, background 0.2s;
cursor: text;
}
.field:focus-within {
border-color: var(–blue);
background: rgba(59,130,246,0.05);
}
.field label {
display: block; font-size: 10px; font-weight: 600;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(–text3); margin-bottom: 6px;
}
.field-row { display: flex; align-items: baseline; gap: 5px; }
.field input {
background: transparent; border: none; outline: none;
font-size: 26px; font-weight: 500;
font-family: var(–mono);
color: var(–text); width: 100%;
-webkit-appearance: none;
}
.field input::placeholder { color: var(–text3); }
.field .unit {
font-size: 13px; color: var(–text3);
font-family: var(–mono); white-space: nowrap;
}
.field-hint {
font-size: 9px; color: var(–text3);
margin-top: 3px; letter-spacing: 0.04em;
}

/* Résultats */
.result-angle-row {
display: flex; align-items: flex-end;
gap: 6px; margin-bottom: 4px;
}
.result-value {
font-size: clamp(56px, 10vw, 80px);
font-weight: 300; letter-spacing: -0.04em;
line-height: 1; font-family: var(–mono);
transition: color 0.4s;
color: var(–green);
}
.result-deg {
font-size: 32px; font-weight: 300;
color: var(–text3); font-family: var(–mono);
margin-bottom: 10px;
}
.result-sublabel {
font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
text-transform: uppercase; color: var(–text3); margin-bottom: 20px;
}

.chips {
display: grid; grid-template-columns: 1fr 1fr 1fr;
gap: 8px; margin-bottom: 16px;
}
.chip {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px; padding: 10px 8px; text-align: center;
}
.chip .cv {
font-size: 17px; font-weight: 500;
font-family: var(–mono); color: var(–text);
letter-spacing: -0.02em;
}
.chip .cl {
font-size: 9px; color: var(–text3);
text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px;
}

/* Status */
.status {
display: flex; align-items: center; gap: 10px;
padding: 12px 14px; border-radius: 10px;
font-size: 13px; font-weight: 600;
transition: all 0.3s;
}
.status.ok {
background: rgba(34,197,94,0.1);
border: 1px solid rgba(34,197,94,0.25);
color: var(–green-light);
}
.status.warn {
background: rgba(234,179,8,0.1);
border: 1px solid rgba(234,179,8,0.25);
color: var(–yellow-light);
}
.status.danger {
background: rgba(239,68,68,0.1);
border: 1px solid rgba(239,68,68,0.25);
color: var(–red-light);
}
.status.error {
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
color: var(–text2);
}
.sdot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.ok .sdot    { background: var(–green);  box-shadow: 0 0 8px var(–green); }
.warn .sdot  { background: var(–yellow); box-shadow: 0 0 8px var(–yellow); }
.danger .sdot{ background: var(–red);    box-shadow: 0 0 8px var(–red); }
.error .sdot { background: var(–text3); }

/* Schéma — pleine largeur */
.schema-card { margin-bottom: 16px; }
.schema-header {
display: flex; justify-content: space-between;
align-items: center; margin-bottom: 16px;
}
.scale-badge {
font-size: 10px; font-weight: 600;
color: var(–text3); letter-spacing: 0.08em;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 6px; padding: 4px 10px;
font-family: var(–mono);
}
.schema-wrap {
background: var(–bg);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
overflow: hidden;
}
.schema-wrap svg { width: 100%; height: auto; display: block; }

/* Footer info */
.info-row {
display: flex; gap: 12px; flex-wrap: wrap;
}
.info-pill {
font-size: 11px; color: var(–text3);
background: var(–bg);
border: 1px solid var(–border);
border-radius: 100px; padding: 5px 12px;
font-family: var(–mono);
}

/* Responsive tablette/PC : résultats à côté des paramètres */
@media (min-width: 701px) {
.result-value { font-size: 72px; }
}
</style>

</head>

  </div>

  <!-- Schéma pleine largeur -->

<script>
['d1','d2','cf','h'].forEach(id => document.getElementById(id).addEventListener('input', calculate));

function computeAngle(D1, D2, CF, H) {
  const R1=D1/2, R2=D2/2;
  const dx=CF-R1-R2, dy=H;
  if (dx<0) return {error:`CF minimum = ${Math.round(R1+R2)} mm`};
  if (D2===0||(dx===0&&dy===0)) return {alpha:180,dx:0,L:0,direct:true,R1,R2,CF};
  const L=Math.sqrt(dx*dx+dy*dy);
  if (L<R1+R2) return {error:'IMPOSSIBLE — Poulies superposées'};
  const A=dx,B=-dy,C=R1-R2;
  const Lv=Math.sqrt(A*A+B*B);
  if (Math.abs(C/Lv)>1) return {error:'Géométrie impossible'};
  const base=Math.atan2(B,A), delta=Math.acos(C/Lv);
  const cands=[base+delta,base-delta];
  let n=null;
  for (const ni of cands) {
    const P1y=R1*Math.sin(ni), P1x=R1*Math.cos(ni), P2x=dx+R2*Math.cos(ni);
    if (P1y>-R1*0.3&&P2x>P1x-10) {n=ni;break;}
  }
  if (n===null) n=cands[0];
  const P1x_m=R1*Math.cos(n), P1y_m=R1*Math.sin(n);
  const P2x_m=dx+R2*Math.cos(n), P2y_m=-dy+R2*Math.sin(n);
  let arc=Math.PI-n;
  if (arc<0) arc+=2*Math.PI;
  return {alpha:arc*180/Math.PI,dx,dy,L,R1,R2,CF,H:dy,n,P1x_m,P1y_m,P2x_m,P2y_m,valid:true};
}

function calculate() {
  const D1=parseFloat(document.getElementById('d1').value)||0;
  const D2=parseFloat(document.getElementById('d2').value)||0;
  const CF=parseFloat(document.getElementById('cf').value)||0;
  const H =parseFloat(document.getElementById('h').value) ||0;
  if (D1<=0||CF<=0) return setError('Paramètres invalides');
  const res=computeAngle(D1,D2,CF,H);
  if (res.error) return setError(res.error);
  const a=res.alpha;
  document.getElementById('angle-val').textContent=a.toFixed(1);
  document.getElementById('dx-val').textContent=Math.round(res.dx);
  document.getElementById('L-val').textContent=res.L>0?Math.round(res.L):'—';
  document.getElementById('frac-val').textContent=fracStr(a);
  document.getElementById('info-nappe').textContent=`CF = ${Math.round(CF)} mm`;
  const av=document.getElementById('angle-val');
  const st=document.getElementById('status');
  if (a>=150) {
    av.style.color='var(--green)'; st.className='status ok';
    setStatusText(`α = ${a.toFixed(1)}°`);
  } else if (a>=120) {
    av.style.color='var(--yellow)'; st.className='status warn';
    setStatusText(`α = ${a.toFixed(1)}° — Vérifier l'adhérence`);
  } else {
    av.style.color='var(--red)'; st.className='status danger';
    setStatusText(`α = ${a.toFixed(1)}° — Adhérence insuffisante`);
  }
  if (res.direct) drawDirect(res.R1,res.CF);
  else drawSchema(res);
}

function setError(msg) {
  ['angle-val','dx-val','L-val','frac-val'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('angle-val').style.color='var(--text3)';
  document.getElementById('status').className='status error';
  setStatusText(msg);
  document.getElementById('schema').innerHTML=
    `<text x="300" y="150" text-anchor="middle" fill="#475569" font-size="14" font-family="'DM Sans',sans-serif">${msg}</text>`;
  document.getElementById('scale-label').textContent='—';
}

function setStatusText(t){document.getElementById('status-text').textContent=t;}

function fracStr(a) {
  const v=a/360;
  const t=[[1/6,'1/6'],[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4'],[5/6,'5/6'],[1,'1/1']];
  for(const[f,s]of t) if(Math.abs(v-f)<0.015) return s;
  return v.toFixed(2);
}

function getSVGWidth() {
  const svg=document.getElementById('schema');
  const w=svg.parentElement.clientWidth;
  return Math.max(300, w);
}

function drawDirect(R1, CF) {
  const W=600, H=280;
  const scale=Math.min(100,(W-120)/2)/R1;
  const r=R1*scale;
  const cx=W/2, cy=44+r, bot=cy+r+52;
  document.getElementById('schema').setAttribute('viewBox',`0 0 ${W} ${H}`);
  document.getElementById('scale-label').textContent=`1 : ${Math.round(1/scale)}`;
  document.getElementById('schema').innerHTML=`
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#eab308"/></marker>
      <radialGradient id="gT1" cx="40%" cy="35%">
        <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.03"/>
      </radialGradient>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#gT1)" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#3b82f6"/>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}"
          fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="${cx-r}" y1="${bot}" x2="${cx-r}" y2="${cy}" stroke="#eab308" stroke-width="2" stroke-dasharray="7,4"/>
    <polygon points="${cx-r},${cy-r-1} ${cx-r-6},${cy-r+10} ${cx-r+6},${cy-r+10}" fill="#eab308"/>
    <line x1="${cx+r}" y1="${cy}" x2="${cx+r}" y2="${bot}" stroke="#eab308" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr)"/>
    <text x="${cx}" y="${cy-r-12}" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="'DM Sans',sans-serif" font-weight="600">TRACTION Ø${Math.round(R1*2)} mm</text>
    <text x="${cx+r+12}" y="${cy+6}" fill="#f87171" font-size="14" font-family="'DM Mono',monospace" font-weight="500">α = 180°</text>
    <line x1="${cx-r}" y1="${bot+12}" x2="${cx+r}" y2="${bot+12}" stroke="#475569" stroke-width="1.5"/>
    <line x1="${cx-r}" y1="${bot+8}" x2="${cx-r}" y2="${bot+16}" stroke="#475569" stroke-width="1.5"/>
    <line x1="${cx+r}" y1="${bot+8}" x2="${cx+r}" y2="${bot+16}" stroke="#475569" stroke-width="1.5"/>
    <text x="${cx}" y="${bot+28}" text-anchor="middle" fill="#64748b" font-size="10" font-family="'DM Mono',monospace">CF = ${Math.round(R1*2)} mm</text>
  `;
}

function drawSchema(p) {
  const W=600;
  const margin=30, topPad=28, botPad=40;
  const realW=p.CF, realH=p.dy+p.R1+p.R2+60;
  const scale=(W-margin*2)/realW;
  const H=Math.min(520, realH*scale+topPad+botPad+margin);
  document.getElementById('schema').setAttribute('viewBox',`0 0 ${W} ${H}`);
  document.getElementById('scale-label').textContent=`1 : ${Math.round(1/scale)}`;

  const toSVG=(xm,ym)=>({x:margin+(xm+p.R1)*scale, y:topPad+margin+(-ym+p.R1)*scale});
  const c1=toSVG(0,0), c2=toSVG(p.dx,-p.dy);
  const r1=p.R1*scale, r2=p.R2*scale;
  const pt1=toSVG(p.P1x_m,p.P1y_m), pt2=toSVG(p.P2x_m,p.P2y_m);
  const bx1=margin, bx2=margin+p.CF*scale;
  const topBrin=topPad+margin-24, botBrin=Math.max(c2.y+r2,c1.y+r1)+28;
  const ex=c1.x-r1, ey=c1.y;
  const la=p.alpha>180?1:0;

  document.getElementById('schema').innerHTML=`
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#eab308"/></marker>
      <radialGradient id="gT1" cx="40%" cy="35%">
        <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
      </radialGradient>
      <radialGradient id="gT2" cx="40%" cy="35%">
        <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Poulies -->
    <circle cx="${c1.x}" cy="${c1.y}" r="${r1}" fill="url(#gT1)" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="${c1.x}" cy="${c1.y}" r="4" fill="#3b82f6"/>
    <circle cx="${c2.x}" cy="${c2.y}" r="${r2}" fill="url(#gT2)" stroke="#22c55e" stroke-width="2"/>
    <circle cx="${c2.x}" cy="${c2.y}" r="4" fill="#22c55e"/>

    <!-- Axe à axe -->
    <line x1="${c1.x}" y1="${c1.y}" x2="${c2.x}" y2="${c2.y}"
          stroke="#1e293b" stroke-width="1.5" stroke-dasharray="5,4"/>

    <!-- Brin gauche monte -->
    <line x1="${bx1}" y1="${botBrin}" x2="${bx1}" y2="${ey}"
          stroke="#eab308" stroke-width="2.5" stroke-dasharray="7,4"/>
    <polygon points="${bx1},${topBrin+8} ${bx1-6},${topBrin+19} ${bx1+6},${topBrin+19}" fill="#eab308"/>

    <!-- Arc enroulement -->
    <path d="M ${ex} ${ey} A ${r1} ${r1} 0 ${la} 1 ${pt1.x} ${pt1.y}"
          fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"
          filter="url(#glow)"/>

    <!-- Tangente -->
    <line x1="${pt1.x}" y1="${pt1.y}" x2="${pt2.x}" y2="${pt2.y}"
          stroke="#eab308" stroke-width="2.5"/>

    <!-- Brin droit descend -->
    <line x1="${bx2}" y1="${c2.y}" x2="${bx2}" y2="${botBrin}"
          stroke="#eab308" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arr)"/>

    <!-- Labels poulies -->
    <text x="${c1.x}" y="${c1.y-r1-13}" text-anchor="middle"
          fill="#60a5fa" font-size="11" font-family="'DM Sans',sans-serif" font-weight="600">TRACTION Ø${Math.round(p.R1*2)} mm</text>
    <text x="${c2.x}" y="${c2.y-r2-8}" text-anchor="middle"
          fill="#4ade80" font-size="11" font-family="'DM Sans',sans-serif" font-weight="600">DÉFL. Ø${Math.round(p.R2*2)} mm</text>

    <!-- Angle -->
    <text x="${c1.x+8}" y="${c1.y+20}" fill="#f87171"
          font-size="13" font-family="'DM Mono',monospace" font-weight="500">α = ${p.alpha.toFixed(1)}°</text>

    <!-- CF -->
    <line x1="${bx1}" y1="${botBrin+12}" x2="${bx2}" y2="${botBrin+12}" stroke="#334155" stroke-width="1.5"/>
    <line x1="${bx1}" y1="${botBrin+8}" x2="${bx1}" y2="${botBrin+16}" stroke="#334155" stroke-width="1.5"/>
    <line x1="${bx2}" y1="${botBrin+8}" x2="${bx2}" y2="${botBrin+16}" stroke="#334155" stroke-width="1.5"/>
    <text x="${(bx1+bx2)/2}" y="${botBrin+28}" text-anchor="middle"
          fill="#64748b" font-size="10" font-family="'DM Mono',monospace">CF = ${Math.round(p.CF)} mm</text>
  `;
}

calculate();
</script>

</body>
</html>
