<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c14">
<title>Angle enroulement</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#080c14;color:#e2e8f0;min-height:100vh;padding:32px 16px 60px;}
.bg{position:fixed;inset:0;z-index:0;background:#080c14;}
.bg::before{content:'';position:absolute;width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(circle,#1d4ed8,transparent 70%);filter:blur(80px);opacity:.25;}
.bg::after{content:'';position:absolute;width:400px;height:400px;top:-100px;right:-100px;background:radial-gradient(circle,#4f46e5,transparent 70%);filter:blur(80px);opacity:.2;}
.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;}
h1{font-size:32px;font-weight:800;letter-spacing:-.03em;color:#fff;margin-bottom:4px;}
.sub{font-size:14px;color:#64748b;margin-bottom:28px;}
.card{background:#0f172a;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px;margin-bottom:14px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#334155;margin-bottom:16px;}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{background:#020817;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 12px 8px;}
.field:focus-within{border-color:rgba(59,130,246,.5);}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#334155;margin-bottom:5px;}
.field-row{display:flex;align-items:baseline;gap:4px;}
.field input{background:transparent;border:none;outline:none;font-size:26px;font-weight:500;font-family:'JetBrains Mono',monospace;color:#f1f5f9;width:100%;-webkit-appearance:none;}
.unit{font-size:12px;color:#334155;font-family:'JetBrains Mono',monospace;}
.hint{font-size:9px;margin-top:3px;}
.result-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#334155;margin-bottom:6px;}
.result-big{display:flex;align-items:flex-end;gap:5px;margin-bottom:18px;}
.result-num{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:600;line-height:1;letter-spacing:-.04em;color:#22c55e;transition:color .3s;}
.result-deg{font-size:32px;color:#334155;font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.chip{background:#020817;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 6px;text-align:center;}
.chip-val{font-size:17px;font-weight:500;font-family:'JetBrains Mono',monospace;color:#e2e8f0;}
.chip-lbl{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}
.status{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ok{background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);color:#4ade80;}
.ok .status-dot{background:#22c55e;box-shadow:0 0 6px #22c55e;}
.warn{background:rgba(202,138,4,.12);border:1px solid rgba(202,138,4,.3);color:#facc15;}
.warn .status-dot{background:#eab308;box-shadow:0 0 6px #eab308;}
.bad{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#f87171;}
.bad .status-dot{background:#ef4444;box-shadow:0 0 6px #ef4444;}
.sbox{background:#020817;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;}
.sbox svg{width:100%;height:auto;display:block;}
.schema-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.scale{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#334155;background:#020817;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:3px 9px;}
.footer{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.ftag{font-size:10px;color:#334155;font-family:'JetBrains Mono',monospace;background:#020817;border:1px solid rgba(255,255,255,.06);border-radius:100px;padding:4px 11px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <h1>Angle d'enroulement</h1>
  <div class="sub">Poulie de traction &mdash; Machine en haut</div>

  <div class="card">
    <div class="card-title">Parametres</div>
    <div class="fields">
      <div class="field">
        <label>O Traction</label>
        <div class="field-row">
          <input type="number" id="d1" value="650" min="1">
          <span class="unit">mm</span>
        </div>
      </div>
      <div class="field">
        <label>O Deflexion</label>
        <div class="field-row">
          <input type="number" id="d2" value="450" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="hint" style="color:#334155">0 = sans deflexion</div>
      </div>
      <div class="field">
        <label>Entre nappe CF</label>
        <div class="field-row">
          <input type="number" id="cf" value="1300" min="1">
          <span class="unit">mm</span>
        </div>
        <div class="hint" id="cf-hint" style="color:#475569">brin a brin</div>
      </div>
      <div class="field">
        <label>Hauteur H</label>
        <div class="field-row">
          <input type="number" id="h" value="900" min="0">
          <span class="unit">mm</span>
        </div>
        <div class="hint" style="color:#334155">axe a axe vertical</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Resultats</div>
    <div class="result-label">Angle d'enroulement</div>
    <div class="result-big">
      <div class="result-num" id="rnum">-</div>
      <div class="result-deg">deg</div>
    </div>
    <div class="chips">
      <div class="chip"><div class="chip-val" id="rdx">-</div><div class="chip-lbl">Dist horiz</div></div>
      <div class="chip"><div class="chip-val" id="rL">-</div><div class="chip-lbl">Dist axes</div></div>
      <div class="chip"><div class="chip-val" id="rfr">-</div><div class="chip-lbl">Fraction</div></div>
    </div>
    <div class="status ok" id="status">
      <div class="status-dot"></div>
      <span id="status-txt">-</span>
    </div>
  </div>

  <div class="card">
    <div class="schema-head">
      <div class="card-title" style="margin-bottom:0">Schema</div>
      <div class="scale" id="scale">-</div>
    </div>
    <div class="sbox">
      <svg id="svg" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
        <text x="300" y="200" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter,sans-serif">Entrez les parametres</text>
      </svg>
    </div>
  </div>

  <div class="footer">
    <div class="ftag">Schema a l'echelle</div>
    <div class="ftag">Machine en haut</div>
    <div class="ftag" id="ftag">-</div>
  </div>
</div>

<script>
function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }
function setText(id, v) { document.getElementById(id).textContent = v; }

function compute(D1, D2, CF, H) {
  var R1 = D1 / 2;
  var R2 = D2 / 2;
  var dx = CF - R1 - R2;
  var dy = H;
  if (CF < D1) return { error: 'CF inferieur au diametre traction' };
  if (dx < 0)  return { error: 'CF trop petit (min ' + Math.round(R1+R2) + ' mm)' };
  if (!D2 || (dx === 0 && dy === 0)) return { alpha: 180, dx: 0, L: 0, direct: true, R1: R1, R2: R2, CF: CF, D1: D1, D2: D2, H: H };
  var L = Math.sqrt(dx*dx + dy*dy);
  if (L < R1+R2) return { error: 'Poulies superposees - impossible' };
  var A = dx, B = -dy, C = R1-R2;
  var Lv = Math.sqrt(A*A + B*B);
  if (Math.abs(C/Lv) > 1) return { error: 'Geometrie impossible' };
  var base = Math.atan2(B, A);
  var delta = Math.acos(C / Lv);
  var cands = [base + delta, base - delta];
  var n = null;
  for (var i = 0; i < cands.length; i++) {
    var ni = cands[i];
    if (R1*Math.sin(ni) > -R1*0.3 && dx+R2*Math.cos(ni) > R1*Math.cos(ni)-10) {
      n = ni; break;
    }
  }
  if (n === null) n = cands[0];
  var P1x = R1*Math.cos(n), P1y = R1*Math.sin(n);
  var P2x = dx+R2*Math.cos(n), P2y = -dy+R2*Math.sin(n);
  var arc = Math.PI - n;
  if (arc < 0) arc += 2 * Math.PI;
  return { alpha: arc*180/Math.PI, dx: dx, dy: dy, L: L, R1: R1, R2: R2, CF: CF, D1: D1, D2: D2, H: dy, P1x: P1x, P1y: P1y, P2x: P2x, P2y: P2y };
}

function fracStr(a) {
  var v = a / 360;
  var pairs = [[1/6,'1/6'],[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4'],[5/6,'5/6'],[1,'1/1']];
  for (var i = 0; i < pairs.length; i++) {
    if (Math.abs(v - pairs[i][0]) < 0.015) return pairs[i][1];
  }
  return v.toFixed(2);
}

function go() {
  var D1 = getVal('d1');
  var D2 = getVal('d2');
  var CF = getVal('cf');
  var H  = getVal('h');

  var hint = document.getElementById('cf-hint');
  if (D1 > 0) {
    hint.textContent = 'min. ' + Math.round(D1) + ' mm';
    hint.style.color = (CF > 0 && CF < D1) ? '#ef4444' : '#475569';
  }

  document.getElementById('ftag').textContent = CF ? 'CF = ' + CF + ' mm' : '-';

  if (!D1 || !CF) {
    showError('Parametres manquants');
    return;
  }

  var r = compute(D1, D2, CF, H);

  if (r.error) {
    showError(r.error);
    return;
  }

  var a = r.alpha;
  var numEl = document.getElementById('rnum');
  numEl.textContent = a.toFixed(1);

  setText('rdx', Math.round(r.dx));
  setText('rL', r.L > 0 ? Math.round(r.L) : '-');
  setText('rfr', fracStr(a));

  var st = document.getElementById('status');
  var stTxt = document.getElementById('status-txt');
  if (a >= 150) {
    numEl.style.color = '#22c55e';
    st.className = 'status ok';
    stTxt.textContent = 'a = ' + a.toFixed(1) + ' deg';
  } else if (a >= 120) {
    numEl.style.color = '#eab308';
    st.className = 'status warn';
    stTxt.textContent = 'a = ' + a.toFixed(1) + ' deg - Verifier adherence';
  } else {
    numEl.style.color = '#ef4444';
    st.className = 'status bad';
    stTxt.textContent = 'a = ' + a.toFixed(1) + ' deg - Adherence insuffisante';
  }

  if (r.direct) {
    drawDirect(r.R1, r.CF);
  } else {
    drawSchema(r);
  }
}

function showError(msg) {
  setText('rnum', '-');
  setText('rdx', '-');
  setText('rL', '-');
  setText('rfr', '-');
  document.getElementById('rnum').style.color = '#334155';
  var st = document.getElementById('status');
  st.className = 'status bad';
  document.getElementById('status-txt').textContent = msg;
  document.getElementById('svg').innerHTML = '<text x="300" y="200" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter,sans-serif">' + msg + '</text>';
  setText('scale', '-');
}

function drawDirect(R1, CF) {
  var W = 600, mT = 44, mB = 50;
  var sc = Math.min(110, (W-80)/2) / R1;
  var r = R1 * sc;
  var cx = W/2, cy = mT+r, bot = cy+r+55, H = bot+mB;
  setText('scale', '1 : ' + Math.round(1/sc));
  var s = document.getElementById('svg');
  s.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  var bx1 = cx-r, bx2 = cx+r;
  var o = '<defs>';
  o += '<marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>';
  o += '<radialGradient id="g1" cx="35%" cy="30%"><stop offset="0%" stop-color="#1d4ed8" stop-opacity=".2"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".03"/></radialGradient>';
  o += '</defs>';
  o += '<path d="M'+cx+' '+cy+' L'+bx1+' '+cy+' A'+r+' '+r+' 0 0 1 '+bx2+' '+cy+' Z" fill="rgba(239,68,68,0.08)"/>';
  o += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#g1)" stroke="#3b82f6" stroke-width="2.5"/>';
  o += '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#3b82f6"/>';
  o += '<path d="M'+bx1+' '+cy+' A'+r+' '+r+' 0 0 1 '+bx2+' '+cy+'" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>';
  o += '<line x1="'+bx1+'" y1="'+bot+'" x2="'+bx1+'" y2="'+cy+'" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5"/>';
  o += '<polygon points="'+bx1+','+(mT-2)+' '+(bx1-6)+','+(mT+10)+' '+(bx1+6)+','+(mT+10)+'" fill="#eab308"/>';
  o += '<line x1="'+bx2+'" y1="'+cy+'" x2="'+bx2+'" y2="'+bot+'" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#arr)"/>';
  o += '<text x="'+cx+'" y="'+(cy-r-12)+'" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Inter,sans-serif" font-weight="600">TRACTION D'+Math.round(R1*2)+' mm</text>';
  o += '<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" fill="#f87171" font-size="14" font-family="JetBrains Mono,monospace" font-weight="600">a = 180 deg</text>';
  o += '<line x1="'+bx1+'" y1="'+(bot+13)+'" x2="'+bx2+'" y2="'+(bot+13)+'" stroke="#1e293b" stroke-width="2"/>';
  o += '<line x1="'+bx1+'" y1="'+(bot+9)+'" x2="'+bx1+'" y2="'+(bot+17)+'" stroke="#1e293b" stroke-width="2"/>';
  o += '<line x1="'+bx2+'" y1="'+(bot+9)+'" x2="'+bx2+'" y2="'+(bot+17)+'" stroke="#1e293b" stroke-width="2"/>';
  o += '<text x="'+cx+'" y="'+(bot+29)+'" text-anchor="middle" fill="#475569" font-size="11" font-family="JetBrains Mono,monospace">CF = '+Math.round(R1*2)+' mm</text>';
  s.innerHTML = o;
}

function drawSchema(p) {
  var xMin = -p.R1, xMax = p.dx+p.R2;
  var yMax = p.R1, yMin = -p.dy-p.R2-40;
  var mL=44, mR=44, mT=50, mB=46, W=600;
  var sc = (W-mL-mR) / (xMax-xMin);
  var H = (yMax-yMin)*sc + mT + mB;
  setText('scale', '1 : ' + Math.round(1/sc));
  var s = document.getElementById('svg');
  s.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  function sx(x) { return mL + (x-xMin)*sc; }
  function sy(y) { return mT + (yMax-y)*sc; }
  var c1x=sx(0), c1y=sy(0), c2x=sx(p.dx), c2y=sy(-p.dy);
  var r1=p.R1*sc, r2=p.R2*sc;
  var t1x=sx(p.P1x), t1y=sy(p.P1y), t2x=sx(p.P2x), t2y=sy(p.P2y);
  var bx1=sx(-p.R1), bx2=sx(p.dx+p.R2);
  var topY=mT-22, botY=sy(yMin), la=p.alpha>180?1:0;
  var chx=Math.min(c2x+r2+30, W-30), cfy=botY+14, mhY=(c1y+c2y)/2;
  var o = '<defs>';
  o += '<marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>';
  o += '<marker id="ca1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#475569"/></marker>';
  o += '<marker id="ca2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#475569"/></marker>';
  o += '<radialGradient id="g1" cx="35%" cy="30%"><stop offset="0%" stop-color="#1d4ed8" stop-opacity=".2"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".03"/></radialGradient>';
  o += '<radialGradient id="g2" cx="35%" cy="30%"><stop offset="0%" stop-color="#0f766e" stop-opacity=".2"/><stop offset="100%" stop-color="#0f766e" stop-opacity=".03"/></radialGradient>';
  o += '<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  o += '</defs>';
  o += '<path d="M'+c1x+' '+c1y+' L'+(c1x-r1)+' '+c1y+' A'+r1+' '+r1+' 0 '+la+' 1 '+t1x+' '+t1y+' Z" fill="rgba(239,68,68,0.08)"/>';
  o += '<circle cx="'+c1x+'" cy="'+c1y+'" r="'+r1+'" fill="url(#g1)" stroke="#3b82f6" stroke-width="2.5"/>';
  o += '<circle cx="'+c1x+'" cy="'+c1y+'" r="5" fill="#3b82f6"/>';
  o += '<circle cx="'+c2x+'" cy="'+c2y+'" r="'+r2+'" fill="url(#g2)" stroke="#14b8a6" stroke-width="2.5"/>';
  o += '<circle cx="'+c2x+'" cy="'+c2y+'" r="4" fill="#14b8a6"/>';
  o += '<line x1="'+c1x+'" y1="'+c1y+'" x2="'+c2x+'" y2="'+c2y+'" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,5"/>';
  o += '<line x1="'+bx1+'" y1="'+botY+'" x2="'+bx1+'" y2="'+c1y+'" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5"/>';
  o += '<polygon points="'+bx1+','+(topY+9)+' '+(bx1-6)+','+(topY+20)+' '+(bx1+6)+','+(topY+20)+'" fill="#eab308"/>';
  o += '<path d="M'+(c1x-r1)+' '+c1y+' A'+r1+' '+r1+' 0 '+la+' 1 '+t1x+' '+t1y+'" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>';
  o += '<line x1="'+t1x+'" y1="'+t1y+'" x2="'+t2x+'" y2="'+t2y+'" stroke="#eab308" stroke-width="2.5"/>';
  o += '<line x1="'+bx2+'" y1="'+c2y+'" x2="'+bx2+'" y2="'+botY+'" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#arr)"/>';
  o += '<text x="'+c1x+'" y="'+(c1y-r1-12)+'" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Inter,sans-serif" font-weight="600">TRACTION D'+Math.round(p.R1*2)+' mm</text>';
  o += '<text x="'+c2x+'" y="'+(c2y-r2-8)+'" text-anchor="middle" fill="#2dd4bf" font-size="12" font-family="Inter,sans-serif" font-weight="600">DEFL. D'+Math.round(p.R2*2)+' mm</text>';
  o += '<text x="'+(c1x+10)+'" y="'+(c1y+20)+'" fill="#f87171" font-size="14" font-family="JetBrains Mono,monospace" font-weight="600">a = '+p.alpha.toFixed(1)+' deg</text>';
  o += '<line x1="'+chx+'" y1="'+c1y+'" x2="'+chx+'" y2="'+c2y+'" stroke="#475569" stroke-width="1.5" marker-start="url(#ca2)" marker-end="url(#ca1)"/>';
  o += '<text x="'+(chx+8)+'" y="'+(mhY+4)+'" fill="#475569" font-size="10" font-family="JetBrains Mono,monospace">H='+Math.round(p.H)+'mm</text>';
  o += '<line x1="'+bx1+'" y1="'+cfy+'" x2="'+bx2+'" y2="'+cfy+'" stroke="#475569" stroke-width="1.5" marker-start="url(#ca2)" marker-end="url(#ca1)"/>';
  o += '<line x1="'+bx1+'" y1="'+(cfy-4)+'" x2="'+bx1+'" y2="'+(cfy+4)+'" stroke="#475569" stroke-width="1.5"/>';
  o += '<line x1="'+bx2+'" y1="'+(cfy-4)+'" x2="'+bx2+'" y2="'+(cfy+4)+'" stroke="#475569" stroke-width="1.5"/>';
  o += '<text x="'+((bx1+bx2)/2)+'" y="'+(cfy+15)+'" text-anchor="middle" fill="#475569" font-size="10" font-family="JetBrains Mono,monospace">CF = '+Math.round(p.CF)+' mm</text>';
  s.innerHTML = o;
}

document.getElementById('d1').addEventListener('input', go);
document.getElementById('d2').addEventListener('input', go);
document.getElementById('cf').addEventListener('input', go);
document.getElementById('h').addEventListener('input', go);

go();
</script>

</body>
</html>
