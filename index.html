<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#080c14">
<title>Angle d'enroulement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #080c14; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #080c14;
  color: #e2e8f0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #080c14; }
.blob {
position: absolute; border-radius: 50%;
filter: blur(90px); opacity: 0.22;
animation: bm 18s ease-in-out infinite alternate;
}
.b1 { width:600px;height:600px;top:-200px;left:-150px;background:radial-gradient(circle,#1d4ed8,transparent 70%); animation-duration:18s; }
.b2 { width:500px;height:500px;top:-100px;right:-100px;background:radial-gradient(circle,#4f46e5,transparent 70%); animation-duration:14s; animation-direction:alternate-reverse; }
.b3 { width:400px;height:400px;bottom:10%;left:30%;background:radial-gradient(circle,#0f766e,transparent 70%); animation-duration:20s; }
@keyframes bm {
0%   { transform:translate(0,0) scale(1); }
50%  { transform:translate(40px,30px) scale(1.1); }
100% { transform:translate(-20px,50px) scale(0.95); }
}

.app {
position: relative; z-index: 1;
max-width: 1000px; margin: 0 auto;
padding: 40px 18px 80px;
}

.badge {
display: inline-flex; align-items: center; gap: 7px;
font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
text-transform: uppercase; color: #93c5fd;
background: rgba(59,130,246,0.15);
border: 1px solid rgba(59,130,246,0.3);
border-radius: 100px; padding: 5px 13px; margin-bottom: 16px;
}
.bdot { width:5px;height:5px;border-radius:50%;background:#3b82f6;box-shadow:0 0 8px #3b82f6; }

h1 {
font-size: clamp(30px,6vw,52px);
font-weight: 800; letter-spacing: -0.03em;
line-height: 1.05; color: #fff; margin-bottom: 6px;
}
.sub { font-size: 15px; color: #64748b; margin-bottom: 40px; }

.grid2 {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
gap: 14px; margin-bottom: 14px;
}

.card {
background: rgba(15,23,42,0.92);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 20px; overflow: hidden; position: relative;
}
.card::before {
content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent 10%,rgba(255,255,255,0.1) 50%,transparent 90%);
}
.cb { padding: 22px; }
.ct {
font-size:10px;font-weight:700;letter-spacing:0.13em;
text-transform:uppercase;color:#334155;margin-bottom:20px;
}

.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field {
background: rgba(2,8,23,0.8);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 13px; padding: 14px 14px 10px;
transition: border-color 0.2s; cursor: text;
}
.field:focus-within { border-color: rgba(59,130,246,0.6); }
.fl {
font-size:10px;font-weight:600;letter-spacing:0.1em;
text-transform:uppercase;color:#334155;margin-bottom:7px;display:block;
}
.fr { display:flex;align-items:baseline;gap:5px; }
.field input {
background:transparent;border:none;outline:none;
font-size:28px;font-weight:500;
font-family:‘JetBrains Mono’,monospace;
color:#f1f5f9;width:100%;-webkit-appearance:none;letter-spacing:-0.02em;
}
.fu { font-size:13px;color:#334155;font-family:‘JetBrains Mono’,monospace; }
.fh { font-size:9px;color:#334155;margin-top:4px;letter-spacing:0.05em; }

.rl { font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#334155;margin-bottom:8px; }
.rr { display:flex;align-items:flex-end;gap:5px;margin-bottom:20px; }
.rv {
font-family:‘JetBrains Mono’,monospace;
font-size:clamp(52px,9vw,76px);font-weight:600;line-height:1;
letter-spacing:-0.04em;transition:color 0.4s;color:#22c55e;
}
.ru { font-size:30px;color:#334155;font-family:‘JetBrains Mono’,monospace;margin-bottom:8px; }

.chips { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px; }
.chip {
background:rgba(2,8,23,0.8);border:1px solid rgba(255,255,255,0.07);
border-radius:11px;padding:11px 6px;text-align:center;
}
.cv { font-size:18px;font-weight:500;font-family:‘JetBrains Mono’,monospace;color:#e2e8f0;letter-spacing:-0.02em; }
.cl { font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:0.09em;margin-top:4px; }

.pill {
display:flex;align-items:center;gap:10px;
padding:12px 16px;border-radius:12px;
font-size:13px;font-weight:600;transition:all 0.3s;
}
.pd { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.ok   { background:rgba(22,163,74,0.12);border:1px solid rgba(22,163,74,0.3);color:#4ade80; }
.warn { background:rgba(202,138,4,0.12);border:1px solid rgba(202,138,4,0.3);color:#facc15; }
.bad  { background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);color:#f87171; }
.err  { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#475569; }
.ok .pd   { background:#22c55e;box-shadow:0 0 8px #22c55e; }
.warn .pd { background:#eab308;box-shadow:0 0 8px #eab308; }
.bad .pd  { background:#ef4444;box-shadow:0 0 8px #ef4444; }
.err .pd  { background:#334155; }

.scard { margin-bottom: 14px; }
.sh { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
.stag {
font-size:10px;font-weight:600;font-family:‘JetBrains Mono’,monospace;
color:#334155;letter-spacing:0.08em;
background:rgba(2,8,23,0.8);border:1px solid rgba(255,255,255,0.07);
border-radius:7px;padding:4px 10px;
}
.sbox { background:rgba(2,8,23,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:14px;overflow:hidden; }
.sbox svg { width:100%;height:auto;display:block; }

.footer { display:flex;gap:10px;flex-wrap:wrap;margin-top:4px; }
.ftag {
font-size:10px;color:#334155;font-family:‘JetBrains Mono’,monospace;
background:rgba(2,8,23,0.8);border:1px solid rgba(255,255,255,0.06);
border-radius:100px;padding:5px 12px;
}
</style>

</head>
<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="app">

  </div>

  <div class="card scard">
    <div class="cb">
      <div class="sh">
        <div class="ct" style="margin-bottom:0">Schéma géométrique</div>
        <div class="stag" id="stag">—</div>
      </div>
      <div class="sbox">
        <svg id="schema" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="ftag">Schéma à l'échelle</div>
    <div class="ftag">Machine en haut</div>
    <div class="ftag" id="ftag-cf">—</div>
  </div>
</div>

<script>
['d1','d2','cf','h'].forEach(id => document.getElementById(id).addEventListener('input', go));

function computeAngle(D1,D2,CF,H) {
  const R1=D1/2, R2=D2/2, dx=CF-R1-R2, dy=H;
  if (CF < D1) return {error:`CF (${Math.round(CF)} mm) < Ø traction (${Math.round(D1)} mm) — Impossible`};
  if (dx<0) return {error:`CF minimum = ${Math.round(R1+R2)} mm`};
  if (!D2||(dx===0&&dy===0)) return {alpha:180,dx:0,L:0,direct:true,R1,R2,CF};
  const L=Math.sqrt(dx*dx+dy*dy);
  if (L<R1+R2) return {error:'IMPOSSIBLE — Poulies superposées'};
  const A=dx,B=-dy,C=R1-R2,Lv=Math.sqrt(A*A+B*B);
  if (Math.abs(C/Lv)>1) return {error:'Géométrie impossible'};
  const base=Math.atan2(B,A),delta=Math.acos(C/Lv);
  let n=null;
  for (const ni of [base+delta,base-delta]) {
    if (R1*Math.sin(ni)>-R1*0.3 && dx+R2*Math.cos(ni)>R1*Math.cos(ni)-10) {n=ni;break;}
  }
  if (!n) n=base+delta;
  const P1x=R1*Math.cos(n), P1y=R1*Math.sin(n);
  const P2x=dx+R2*Math.cos(n), P2y=-dy+R2*Math.sin(n);
  let arc=Math.PI-n; if(arc<0) arc+=2*Math.PI;
  return {alpha:arc*180/Math.PI,dx,dy,L,R1,R2,CF,H:dy,n,P1x,P1y,P2x,P2y,valid:true};
}

function go() {
  const D1=+document.getElementById('d1').value||0;
  const D2=+document.getElementById('d2').value||0;
  const CF=+document.getElementById('cf').value||0;
  const H =+document.getElementById('h').value ||0;
  document.getElementById('ftag-cf').textContent=`CF = ${CF} mm`;
  if (!D1||!CF) return setErr('Paramètres invalides');
  const r=computeAngle(D1,D2,CF,H);
  if (r.error) return setErr(r.error);
  const a=r.alpha;
  setV('angle-val',a.toFixed(1));
  setV('dx-val',Math.round(r.dx));
  setV('L-val',r.L>0?Math.round(r.L):'—');
  setV('frac-val',frac(a));
  const av=document.getElementById('angle-val');
  const p=document.getElementById('pill');
  if (a>=150){av.style.color='#22c55e';p.className='pill ok';setT(`α = ${a.toFixed(1)}°`);}
  else if(a>=120){av.style.color='#eab308';p.className='pill warn';setT(`α = ${a.toFixed(1)}° — Vérifier l'adhérence`);}
  else{av.style.color='#ef4444';p.className='pill bad';setT(`α = ${a.toFixed(1)}° — Adhérence insuffisante`);}
  r.direct ? drawDirect(r.R1,r.CF) : drawSchema(r);
}

function setErr(msg) {
  ['angle-val','dx-val','L-val','frac-val'].forEach(id=>setV(id,'—'));
  document.getElementById('angle-val').style.color='#334155';
  document.getElementById('pill').className='pill bad';
  setT(msg);
  document.getElementById('schema').innerHTML=`<text x="300" y="200" text-anchor="middle" fill="#334155" font-size="14" font-family="Inter,sans-serif">${msg}</text>`;
  setV('stag','—');
}

function setV(id,v){document.getElementById(id).textContent=v;}
function setT(t){document.getElementById('pill-txt').textContent=t;}

function frac(a) {
  const v=a/360;
  for(const[f,s]of[[1/6,'1/6'],[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4'],[5/6,'5/6'],[1,'1/1']])
    if(Math.abs(v-f)<0.015) return s;
  return v.toFixed(2);
}

function drawDirect(R1,CF) {
  // Système : T1 centré, brin gauche et droit, arc bas
  const mL=40,mR=40,mT=44,mB=50;
  const W=600;
  const maxR=Math.min(120,(W-mL-mR)/2);
  const sc=maxR/R1;
  const r=R1*sc;
  const cx=W/2, cy=mT+r;
  const botBrin=cy+r+55;
  const H=botBrin+mB;

  setV('stag',`1 : ${Math.round(1/sc)}`);
  const svg=document.getElementById('schema');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const bx1=cx-r, bx2=cx+r;

  svg.innerHTML=`
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
    <radialGradient id="g1" cx="35%" cy="30%"><stop offset="0%" stop-color="#1d4ed8" stop-opacity=".22"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".04"/></radialGradient>
  </defs>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#g1)" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="${cx}" cy="${cy}" r="5" fill="#3b82f6"/>
  <path d="M${bx1} ${cy} A${r} ${r} 0 0 1 ${bx2} ${cy}" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="${bx1}" y1="${botBrin}" x2="${bx1}" y2="${cy}" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5"/>
  <polygon points="${bx1},${mT-2} ${bx1-6},${mT+10} ${bx1+6},${mT+10}" fill="#eab308"/>
  <line x1="${bx2}" y1="${cy}" x2="${bx2}" y2="${botBrin}" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#a)"/>
  <text x="${cx}" y="${cy-r-15}" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Inter,sans-serif" font-weight="600">TRACTION Ø${Math.round(R1*2)} mm</text>
  <text x="${cx+r+14}" y="${cy+8}" fill="#f87171" font-size="15" font-family="'JetBrains Mono',monospace" font-weight="600">α = 180°</text>
  <line x1="${bx1}" y1="${botBrin+13}" x2="${bx2}" y2="${botBrin+13}" stroke="#1e293b" stroke-width="2"/>
  <line x1="${bx1}" y1="${botBrin+9}" x2="${bx1}" y2="${botBrin+17}" stroke="#1e293b" stroke-width="2"/>
  <line x1="${bx2}" y1="${botBrin+9}" x2="${bx2}" y2="${botBrin+17}" stroke="#1e293b" stroke-width="2"/>
  <text x="${cx}" y="${botBrin+31}" text-anchor="middle" fill="#475569" font-size="11" font-family="'JetBrains Mono',monospace">CF = ${Math.round(R1*2)} mm</text>`;
}

function drawSchema(p) {
  // Coords math (y vers le haut) :
  // T1 centre = (0,0)
  // T2 centre = (p.dx, -p.dy)
  // Brin gauche x = -R1
  // Brin droit x = p.dx + R2
  //
  // Bornes du système COMPLET (avec brins qui descendent au même niveau) :
  // On fait descendre les deux brins jusqu'au même niveau bas = -p.dy - p.R2 - 30mm extra
  const extraBrin = 40; // mm en dessous de T2
  const xMin = -p.R1;
  const xMax = p.dx + p.R2;
  const yMax = p.R1;                    // sommet T1
  const yMin = -p.dy - p.R2 - extraBrin; // bas des brins

  const realW = xMax - xMin;  // = CF
  const realH = yMax - yMin;

  const mL=40, mR=40, mT=48, mB=44;
  const W=600;
  const sc = (W-mL-mR)/realW;
  const H = realH*sc + mT + mB;

  setV('stag',`1 : ${Math.round(1/sc)}`);
  const svg=document.getElementById('schema');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  // Conversion coords math → SVG
  // x_svg = mL + (xm - xMin)*sc
  // y_svg = mT + (yMax - ym)*sc  [inversion y]
  const sx = xm => mL + (xm - xMin)*sc;
  const sy = ym => mT + (yMax - ym)*sc;

  const c1x=sx(0), c1y=sy(0);
  const c2x=sx(p.dx), c2y=sy(-p.dy);
  const r1=p.R1*sc, r2=p.R2*sc;

  // Points de tangence
  const t1x=sx(p.P1x), t1y=sy(p.P1y);
  const t2x=sx(p.P2x), t2y=sy(p.P2y);

  // Brins
  const bx1=sx(-p.R1);   // brin gauche (tangente gauche T1)
  const bx2=sx(p.dx+p.R2); // brin droit (tangente droite T2)
  const botY=sy(yMin);   // bas des deux brins (même niveau)
  const topY=mT-22;      // haut du brin entrant (flèche)

  // Arc : de 180° (gauche de T1) à t1, sens horaire SVG (sweep=1)
  const la=p.alpha>180?1:0;

  svg.innerHTML=`
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#eab308"/></marker>
    <radialGradient id="g1" cx="35%" cy="30%"><stop offset="0%" stop-color="#1d4ed8" stop-opacity=".2"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity=".03"/></radialGradient>
    <radialGradient id="g2" cx="35%" cy="30%"><stop offset="0%" stop-color="#0f766e" stop-opacity=".2"/><stop offset="100%" stop-color="#0f766e" stop-opacity=".03"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Poulies -->
  <circle cx="${c1x}" cy="${c1y}" r="${r1}" fill="url(#g1)" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="${c1x}" cy="${c1y}" r="5" fill="#3b82f6"/>
  <circle cx="${c2x}" cy="${c2y}" r="${r2}" fill="url(#g2)" stroke="#14b8a6" stroke-width="2.5"/>
  <circle cx="${c2x}" cy="${c2y}" r="4" fill="#14b8a6"/>

  <!-- Axe à axe -->
  <line x1="${c1x}" y1="${c1y}" x2="${c2x}" y2="${c2y}" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- Brin gauche (monte par le bas) -->
  <line x1="${bx1}" y1="${botY}" x2="${bx1}" y2="${c1y}" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5"/>
  <polygon points="${bx1},${topY+9} ${bx1-6},${topY+20} ${bx1+6},${topY+20}" fill="#eab308"/>

  <!-- Arc enroulement sur T1 -->
  <path d="M${c1x-r1} ${c1y} A${r1} ${r1} 0 ${la} 1 ${t1x} ${t1y}"
        fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Tangente T1→T2 -->
  <line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="#eab308" stroke-width="2.5"/>

  <!-- Brin droit (descend depuis T2) -->
  <line x1="${bx2}" y1="${c2y}" x2="${bx2}" y2="${botY}" stroke="#eab308" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#a)"/>

  <!-- Labels poulies -->
  <text x="${c1x}" y="${c1y-r1-14}" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Inter,sans-serif" font-weight="600">TRACTION Ø${Math.round(p.R1*2)} mm</text>
  <text x="${c2x}" y="${c2y-r2-10}" text-anchor="middle" fill="#2dd4bf" font-size="12" font-family="Inter,sans-serif" font-weight="600">DÉFL. Ø${Math.round(p.R2*2)} mm</text>

  <!-- Angle alpha -->
  <text x="${c1x+10}" y="${c1y+22}" fill="#f87171" font-size="14" font-family="'JetBrains Mono',monospace" font-weight="600">α = ${p.alpha.toFixed(1)}°</text>

  <!-- CF nappe -->
  <line x1="${bx1}" y1="${botY+14}" x2="${bx2}" y2="${botY+14}" stroke="#1e293b" stroke-width="2"/>
  <line x1="${bx1}" y1="${botY+10}" x2="${bx1}" y2="${botY+18}" stroke="#1e293b" stroke-width="2"/>
  <line x1="${bx2}" y1="${botY+10}" x2="${bx2}" y2="${botY+18}" stroke="#1e293b" stroke-width="2"/>
  <text x="${(bx1+bx2)/2}" y="${botY+31}" text-anchor="middle" fill="#475569" font-size="11" font-family="'JetBrains Mono',monospace">CF = ${Math.round(p.CF)} mm</text>`;
}

go();
</script>

</body>
