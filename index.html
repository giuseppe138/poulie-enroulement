<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Angle d'enroulement</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap');

:root {
–glass-bg: rgba(255,255,255,0.08);
–glass-bg-strong: rgba(255,255,255,0.13);
–glass-border: rgba(255,255,255,0.18);
–glass-border-strong: rgba(255,255,255,0.28);
–glass-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
–glass-inner: inset 0 1px 0 rgba(255,255,255,0.2);
–blue: #0A84FF;
–green: #30D158;
–yellow: #FFD60A;
–red: #FF453A;
–text: #ffffff;
–text-secondary: rgba(255,255,255,0.55);
–text-tertiary: rgba(255,255,255,0.3);
–radius-card: 22px;
–radius-inner: 14px;
–font: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: var(–font);
min-height: 100vh;
background: #000;
color: var(–text);
overflow-x: hidden;
padding-bottom: 60px;
}

/* Wallpaper dynamique */
.wallpaper {
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,100,255,0.35) 0%, transparent 60%),
radial-gradient(ellipse 60% 50% at 80% 20%, rgba(100,0,255,0.25) 0%, transparent 55%),
radial-gradient(ellipse 70% 60% at 50% 80%, rgba(0,150,200,0.2) 0%, transparent 60%),
radial-gradient(ellipse 50% 40% at 90% 70%, rgba(0,80,180,0.2) 0%, transparent 50%),
linear-gradient(160deg, #0a0a1a 0%, #080818 40%, #06060f 100%);
animation: wallpaperShift 12s ease-in-out infinite alternate;
}

@keyframes wallpaperShift {
0%   { filter: hue-rotate(0deg) brightness(1); }
50%  { filter: hue-rotate(15deg) brightness(1.05); }
100% { filter: hue-rotate(-10deg) brightness(0.95); }
}

/* Noise texture */
.wallpaper::after {
content: ‘’;
position: absolute; inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
opacity: 0.5;
pointer-events: none;
}

.content {
position: relative; z-index: 1;
padding: 56px 16px 20px;
max-width: 430px; margin: 0 auto;
}

/* Header */
.header {
margin-bottom: 32px;
padding: 0 4px;
}
.header-eyebrow {
font-size: 11px; font-weight: 600;
letter-spacing: 0.12em; text-transform: uppercase;
color: var(–blue); margin-bottom: 6px;
opacity: 0.9;
}
.header h1 {
font-size: 34px; font-weight: 700;
letter-spacing: -0.02em; line-height: 1.05;
color: var(–text);
}
.header-sub {
font-size: 13px; color: var(–text-secondary);
margin-top: 4px; letter-spacing: 0.02em;
}

/* Glass card */
.glass-card {
background: var(–glass-bg);
backdrop-filter: blur(40px) saturate(180%);
-webkit-backdrop-filter: blur(40px) saturate(180%);
border: 1px solid var(–glass-border);
border-radius: var(–radius-card);
box-shadow: var(–glass-shadow), var(–glass-inner);
margin-bottom: 16px;
overflow: hidden;
transition: all 0.3s ease;
}

.glass-card-inner {
padding: 20px;
}

/* Section label */
.section-label {
font-size: 11px; font-weight: 600;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(–text-tertiary); margin-bottom: 14px;
padding: 0 2px;
}

/* Input fields */
.inputs-grid {
display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

.field {
background: var(–glass-bg-strong);
border: 1px solid var(–glass-border);
border-radius: var(–radius-inner);
padding: 14px 14px 10px;
transition: border-color 0.2s, background 0.2s;
position: relative;
overflow: hidden;
}
.field::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}
.field:focus-within {
border-color: rgba(10,132,255,0.6);
background: rgba(10,132,255,0.08);
}
.field label {
display: block; font-size: 10px; font-weight: 600;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(–text-tertiary); margin-bottom: 6px;
}
.field-row { display: flex; align-items: baseline; gap: 4px; }
.field input {
background: transparent; border: none; outline: none;
font-size: 24px; font-weight: 400;
font-family: var(–font);
color: var(–text); width: 100%;
-webkit-appearance: none; letter-spacing: -0.02em;
}
.field .unit {
font-size: 13px; color: var(–text-tertiary);
font-weight: 400; white-space: nowrap;
}
.field-hint {
font-size: 9px; color: var(–text-tertiary);
margin-top: 3px; letter-spacing: 0.04em;
}

/* Résultats */
.result-main-row {
display: flex; align-items: flex-end;
gap: 6px; margin-bottom: 6px;
}
.result-value {
font-size: 72px; font-weight: 300;
letter-spacing: -0.04em; line-height: 1;
transition: color 0.4s ease;
color: var(–green);
font-variant-numeric: tabular-nums;
}
.result-deg {
font-size: 32px; font-weight: 300;
color: var(–text-tertiary); margin-bottom: 10px;
letter-spacing: -0.02em;
}
.result-sublabel {
font-size: 11px; color: var(–text-tertiary);
letter-spacing: 0.06em; text-transform: uppercase;
margin-bottom: 20px;
}

.chips-row {
display: grid; grid-template-columns: 1fr 1fr 1fr;
gap: 8px; margin-bottom: 16px;
}
.chip {
background: rgba(0,0,0,0.25);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 12px; padding: 10px 8px; text-align: center;
}
.chip .cval {
font-size: 16px; font-weight: 500;
color: var(–text); letter-spacing: -0.01em;
}
.chip .clbl {
font-size: 9px; color: var(–text-tertiary);
text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px;
}

/* Status pill */
.status-pill {
display: flex; align-items: center; gap: 8px;
padding: 11px 14px; border-radius: 12px;
font-size: 13px; font-weight: 600;
transition: all 0.3s ease;
letter-spacing: 0.01em;
}
.status-pill.ok {
background: rgba(48,209,88,0.12);
border: 1px solid rgba(48,209,88,0.25);
color: var(–green);
}
.status-pill.warn {
background: rgba(255,214,10,0.12);
border: 1px solid rgba(255,214,10,0.25);
color: var(–yellow);
}
.status-pill.danger {
background: rgba(255,69,58,0.12);
border: 1px solid rgba(255,69,58,0.25);
color: var(–red);
}
.status-pill.error {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text-secondary);
}
.status-dot {
width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.ok .status-dot    { background: var(–green); box-shadow: 0 0 6px var(–green); }
.warn .status-dot  { background: var(–yellow); box-shadow: 0 0 6px var(–yellow); }
.danger .status-dot{ background: var(–red); box-shadow: 0 0 6px var(–red); }
.error .status-dot { background: var(–text-tertiary); }

/* Schéma */
.schema-header {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 14px;
}
.scale-badge {
font-size: 10px; font-weight: 600;
color: var(–text-tertiary); letter-spacing: 0.08em;
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 6px; padding: 3px 8px;
}
.schema-svg-wrap { border-radius: 14px; overflow: hidden; }
.schema-svg-wrap svg { width: 100%; height: auto; display: block; }
</style>

</head>
<body>

<div class="wallpaper"></div>

<div class="content">

  <!-- Header -->

  <div class="header">
    <div class="header-eyebrow">Ascenseur · Calcul</div>
    <h1>Angle d'enroulement</h1>
    <div class="header-sub">Poulie de traction — Machine en haut</div>
  </div>

  <!-- Paramètres -->

  <div class="glass-card">
    <div class="glass-card-inner">
      <div class="section-label">Paramètres</div>
      <div class="inputs-grid">
        <div class="field">
          <label>Ø Traction</label>
          <div class="field-row">
            <input type="number" id="d1" value="650" inputmode="decimal" min="1">
            <span class="unit">mm</span>
          </div>
        </div>
        <div class="field">
          <label>Ø Déflexion</label>
          <div class="field-row">
            <input type="number" id="d2" value="450" inputmode="decimal" min="0">
            <span class="unit">mm</span>
          </div>
          <div class="field-hint">0 = sans déflexion</div>
        </div>
        <div class="field">
          <label>Entre nappe CF</label>
          <div class="field-row">
            <input type="number" id="cf" value="1300" inputmode="decimal" min="1">
            <span class="unit">mm</span>
          </div>
          <div class="field-hint">brin à brin</div>
        </div>
        <div class="field">
          <label>Hauteur H</label>
          <div class="field-row">
            <input type="number" id="h" value="900" inputmode="decimal" min="0">
            <span class="unit">mm</span>
          </div>
          <div class="field-hint">axe à axe vertical</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Résultats -->

  <div class="glass-card">
    <div class="glass-card-inner">
      <div class="section-label">Résultats</div>
      <div class="result-sublabel">Angle d'enroulement</div>
      <div class="result-main-row">
        <div class="result-value" id="angle-val">—</div>
        <div class="result-deg">°</div>
      </div>
      <div class="chips-row">
        <div class="chip">
          <div class="cval" id="dx-val">—</div>
          <div class="clbl">Dist. horiz.</div>
        </div>
        <div class="chip">
          <div class="cval" id="L-val">—</div>
          <div class="clbl">Dist. axes</div>
        </div>
        <div class="chip">
          <div class="cval" id="frac-val">—</div>
          <div class="clbl">Fraction</div>
        </div>
      </div>
      <div class="status-pill ok" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">—</span>
      </div>
    </div>
  </div>

  <!-- Schéma -->

  <div class="glass-card">
    <div class="glass-card-inner">
      <div class="schema-header">
        <div class="section-label" style="margin-bottom:0">Schéma</div>
        <div class="scale-badge" id="scale-label">—</div>
      </div>
      <div class="schema-svg-wrap">
        <svg id="schema" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>

</div>

<script>
['d1','d2','cf','h'].forEach(id => document.getElementById(id).addEventListener('input', calculate));

function computeAngle(D1, D2, CF, H) {
  const R1 = D1/2, R2 = D2/2;
  const dx = CF - R1 - R2;
  const dy = H;
  if (dx < 0) return { error: `CF minimum = ${Math.round(R1+R2)} mm` };
  if (D2 === 0 || (dx === 0 && dy === 0))
    return { alpha: 180, dx: 0, L: 0, direct: true, R1, R2, CF };
  const L = Math.sqrt(dx*dx + dy*dy);
  if (L < R1 + R2) return { error: 'IMPOSSIBLE — Poulies superposées' };
  const A = dx, B = -dy, C = R1-R2;
  const Lv = Math.sqrt(A*A + B*B);
  if (Math.abs(C/Lv) > 1) return { error: 'Géométrie impossible' };
  const base = Math.atan2(B, A);
  const delta = Math.acos(C/Lv);
  const candidates = [base+delta, base-delta];
  let n = null;
  for (const ni of candidates) {
    const P1y = R1*Math.sin(ni);
    const P1x = R1*Math.cos(ni);
    const P2x = dx + R2*Math.cos(ni);
    if (P1y > -R1*0.3 && P2x > P1x-10) { n = ni; break; }
  }
  if (n === null) n = candidates[0];
  const P1x_m = R1*Math.cos(n), P1y_m = R1*Math.sin(n);
  const P2x_m = dx+R2*Math.cos(n), P2y_m = -dy+R2*Math.sin(n);
  let arc = Math.PI - n;
  if (arc < 0) arc += 2*Math.PI;
  return { alpha: arc*180/Math.PI, dx, dy, L, R1, R2, CF, H: dy, n, P1x_m, P1y_m, P2x_m, P2y_m, valid: true };
}

function calculate() {
  const D1 = parseFloat(document.getElementById('d1').value)||0;
  const D2 = parseFloat(document.getElementById('d2').value)||0;
  const CF = parseFloat(document.getElementById('cf').value)||0;
  const H  = parseFloat(document.getElementById('h').value) ||0;
  if (D1<=0||CF<=0) return setError('Paramètres invalides');
  const res = computeAngle(D1, D2, CF, H);
  if (res.error) return setError(res.error);
  const alpha = res.alpha;
  document.getElementById('angle-val').textContent = alpha.toFixed(1);
  document.getElementById('dx-val').textContent    = Math.round(res.dx);
  document.getElementById('L-val').textContent     = res.L>0 ? Math.round(res.L) : '—';
  document.getElementById('frac-val').textContent  = fracStr(alpha);
  const av = document.getElementById('angle-val');
  const pill = document.getElementById('status-pill');
  if (alpha >= 150) {
    av.style.color = 'var(--green)';
    pill.className = 'status-pill ok';
    setStatusText(`α = ${alpha.toFixed(1)}°`);
  } else if (alpha >= 120) {
    av.style.color = 'var(--yellow)';
    pill.className = 'status-pill warn';
    setStatusText(`α = ${alpha.toFixed(1)}° — Vérifier l'adhérence`);
  } else {
    av.style.color = 'var(--red)';
    pill.className = 'status-pill danger';
    setStatusText(`α = ${alpha.toFixed(1)}° — Adhérence insuffisante`);
  }
  if (res.direct) drawDirect(res.R1, res.CF);
  else drawSchema(res);
}

function setError(msg) {
  ['angle-val','dx-val','L-val','frac-val'].forEach(id => document.getElementById(id).textContent='—');
  document.getElementById('angle-val').style.color = 'var(--text-tertiary)';
  document.getElementById('status-pill').className = 'status-pill error';
  setStatusText(msg);
  document.getElementById('schema').innerHTML =
    `<text x="160" y="140" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="12" font-family="-apple-system,sans-serif">${msg}</text>`;
  document.getElementById('scale-label').textContent = '—';
}

function setStatusText(t) { document.getElementById('status-text').textContent = t; }

function fracStr(a) {
  const v=a/360;
  const t=[[1/6,'1/6'],[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4'],[5/6,'5/6'],[1,'1/1']];
  for(const[f,s]of t) if(Math.abs(v-f)<0.015) return s;
  return v.toFixed(2);
}

function drawDirect(R1, CF) {
  const W=320, H=250;
  const scale = Math.min(90, (W-80)/2) / R1;
  const r = R1*scale;
  const cx=W/2, cy=38+r, bot=cy+r+48;
  document.getElementById('schema').setAttribute('viewBox',`0 0 ${W} ${H}`);
  document.getElementById('scale-label').textContent = `1 : ${Math.round(1/scale)}`;
  document.getElementById('schema').innerHTML = `
    <defs><marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="rgba(255,214,10,0.9)"/></marker></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(10,132,255,0.06)" stroke="rgba(10,132,255,0.7)" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="rgba(10,132,255,0.9)"/>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}"
          fill="none" stroke="rgba(255,69,58,0.9)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="${cx-r}" y1="${bot}" x2="${cx-r}" y2="${cy}" stroke="rgba(255,214,10,0.7)" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="${cx-r},${cy-r-1} ${cx-r-5},${cy-r+9} ${cx-r+5},${cy-r+9}" fill="rgba(255,214,10,0.9)"/>
    <line x1="${cx+r}" y1="${cy}" x2="${cx+r}" y2="${bot}" stroke="rgba(255,214,10,0.7)" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>
    <text x="${cx}" y="${cy-r-10}" text-anchor="middle" fill="rgba(10,132,255,0.9)" font-size="10" font-family="-apple-system,sans-serif" font-weight="600">TRACTION Ø${Math.round(R1*2)}</text>
    <text x="${cx+r+8}" y="${cy+5}" fill="rgba(255,69,58,0.95)" font-size="13" font-family="-apple-system,sans-serif" font-weight="700">α = 180°</text>
    <line x1="${cx-r}" y1="${bot+10}" x2="${cx+r}" y2="${bot+10}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="${cx-r}" y1="${bot+7}" x2="${cx-r}" y2="${bot+13}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="${cx+r}" y1="${bot+7}" x2="${cx+r}" y2="${bot+13}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="${cx}" y="${bot+24}" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="-apple-system,sans-serif">CF = ${Math.round(R1*2)} mm</text>
  `;
}

function drawSchema(p) {
  const W=320;
  const margin=22, topPad=24, botPad=36;
  const realW = p.CF;
  const realH = p.dy + p.R1 + p.R2 + 55;
  const scale = (W-margin*2) / realW;
  const H = Math.min(480, realH*scale + topPad + botPad + margin);
  document.getElementById('schema').setAttribute('viewBox',`0 0 ${W} ${H}`);
  document.getElementById('scale-label').textContent = `1 : ${Math.round(1/scale)}`;

  const toSVG = (xm, ym) => ({
    x: margin + (xm + p.R1)*scale,
    y: topPad + margin + (-ym + p.R1)*scale
  });

  const c1 = toSVG(0, 0);
  const c2 = toSVG(p.dx, -p.dy);
  const r1 = p.R1*scale, r2 = p.R2*scale;
  const pt1 = toSVG(p.P1x_m, p.P1y_m);
  const pt2 = toSVG(p.P2x_m, p.P2y_m);
  const bx1 = margin;
  const bx2 = margin + p.CF*scale;
  const topBrin = topPad + margin - 22;
  const botBrin = Math.max(c2.y+r2, c1.y+r1) + 24;
  const entryX = c1.x-r1, entryY = c1.y;
  const largeArc = p.alpha > 180 ? 1 : 0;

  document.getElementById('schema').innerHTML = `
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="rgba(255,214,10,0.9)"/></marker>
      <filter id="glow-red">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Poulie traction -->
    <circle cx="${c1.x}" cy="${c1.y}" r="${r1}" fill="rgba(10,132,255,0.06)" stroke="rgba(10,132,255,0.7)" stroke-width="1.5"/>
    <circle cx="${c1.x}" cy="${c1.y}" r="2.5" fill="rgba(10,132,255,0.9)"/>

    <!-- Poulie déflexion -->
    <circle cx="${c2.x}" cy="${c2.y}" r="${r2}" fill="rgba(48,209,88,0.06)" stroke="rgba(48,209,88,0.7)" stroke-width="1.5"/>
    <circle cx="${c2.x}" cy="${c2.y}" r="2.5" fill="rgba(48,209,88,0.9)"/>

    <!-- Axe à axe -->
    <line x1="${c1.x}" y1="${c1.y}" x2="${c2.x}" y2="${c2.y}"
          stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Brin gauche -->
    <line x1="${bx1}" y1="${botBrin}" x2="${bx1}" y2="${entryY}"
          stroke="rgba(255,214,10,0.7)" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="${bx1},${topBrin+8} ${bx1-5},${topBrin+18} ${bx1+5},${topBrin+18}"
             fill="rgba(255,214,10,0.9)"/>

    <!-- Arc d'enroulement -->
    <path d="M ${entryX} ${entryY} A ${r1} ${r1} 0 ${largeArc} 1 ${pt1.x} ${pt1.y}"
          fill="none" stroke="rgba(255,69,58,0.95)" stroke-width="3.5" stroke-linecap="round"
          filter="url(#glow-red)"/>

    <!-- Tangente -->
    <line x1="${pt1.x}" y1="${pt1.y}" x2="${pt2.x}" y2="${pt2.y}"
          stroke="rgba(255,214,10,0.85)" stroke-width="2"/>

    <!-- Brin droit -->
    <line x1="${bx2}" y1="${c2.y}" x2="${bx2}" y2="${botBrin}"
          stroke="rgba(255,214,10,0.7)" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>

    <!-- Labels -->
    <text x="${c1.x}" y="${c1.y-r1-10}" text-anchor="middle"
          fill="rgba(10,132,255,0.9)" font-size="9" font-family="-apple-system,sans-serif" font-weight="600">TRACTION Ø${Math.round(p.R1*2)}</text>
    <text x="${c2.x}" y="${c2.y-r2-7}" text-anchor="middle"
          fill="rgba(48,209,88,0.9)" font-size="9" font-family="-apple-system,sans-serif" font-weight="600">DÉFL. Ø${Math.round(p.R2*2)}</text>

    <!-- Angle -->
    <text x="${c1.x+8}" y="${c1.y+16}" fill="rgba(255,69,58,0.95)"
          font-size="12" font-family="-apple-system,sans-serif" font-weight="700">α=${p.alpha.toFixed(1)}°</text>

    <!-- CF -->
    <line x1="${bx1}" y1="${botBrin+10}" x2="${bx2}" y2="${botBrin+10}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="${bx1}" y1="${botBrin+7}" x2="${bx1}" y2="${botBrin+13}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="${bx2}" y1="${botBrin+7}" x2="${bx2}" y2="${botBrin+13}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="${(bx1+bx2)/2}" y="${botBrin+24}" text-anchor="middle"
          fill="rgba(255,255,255,0.3)" font-size="9" font-family="-apple-system,sans-serif">CF = ${Math.round(p.CF)} mm</text>
  `;
}

calculate();
</script>

</body>
</html>
